name: CI
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m py_compile bin/codex-hud tests/test_hud.py scripts/validate_public.py
      - run: python -m unittest discover -s tests -v
      - run: python scripts/validate_public.py
      - run: bash -n install.sh uninstall.sh
