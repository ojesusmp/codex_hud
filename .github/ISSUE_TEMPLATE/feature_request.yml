name: Feature request
description: Suggest a portable, privacy-preserving improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What limitation or workflow should be improved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy and portability considerations
      description: Describe any new files, commands, platforms, or data the feature would access.
    validations:
      required: true
