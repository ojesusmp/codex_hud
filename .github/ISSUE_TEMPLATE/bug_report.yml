name: Bug report
description: Report a reproducible Codex HUD defect
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, raw session logs, private hostnames, addresses, or unredacted paths.
  - type: input
    id: version
    attributes:
      label: HUD version
      placeholder: Output of codex-hud --version
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options: [Linux, macOS (unsupported), Windows (unsupported), Other]
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed credentials, private paths, hostnames, addresses, account identifiers, and session content.
          required: true
